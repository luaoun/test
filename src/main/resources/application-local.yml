server:
  port: 8180

spring:
  cloud:
    nacos:
      discovery:
        enabled: false

  datasource:
    mysql:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3307/ifp-operation?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
      username: root
      password: root
      hikari:
        poolName: HikariCP-Mysql
        autoCommit: true
        minimumIdle: 5
        maximumPoolSize: 20
        connectionTimeout: 30000
        keepAliveTime: 60000
        maxLifetime: 1800000
        connectionTestQuery: SELECT 1
    tdengine:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: com.taosdata.jdbc.rs.RestfulDriver
      jdbc-url: jdbc:TAOS-RS://localhost:6041/?charset=utf8mb4&timezone=UTC+8
      username: root
      password: taosdata
      port: 6041
      hikari:
        poolName: HikariCP-TDengine
        autoCommit: true
        minimumIdle: 5
        maximumPoolSize: 20
        connectionTimeout: 30000
        keepAliveTime: 60000
        maxLifetime: 1800000
        connectionTestQuery: SELECT 1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

#  redis:
#    password: Pxredis@321
#    cluster:
#      nodes: 192.168.41.60:6379,192.168.41.61:6379,192.168.41.62:6379
#
#    redisson:
#      nodes: redis://192.168.41.60:6379,redis://192.168.41.61:6379,redis://192.168.41.62:6379

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 5000ms
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    topic:
      localCache: LOCALCACHE

    spc:
      topics: SpcOcapTopic

    producer:
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      acks: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      topics: DataToopic,ods_ifp_business_monitor_rti
      groupId: OperationGroup
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    listener:
      ack-mode: manual_immediate
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

logging:
  level:
    com.px.ifp.spc: DEBUG
    com.px.ifp.spc.mapper: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.apache.ibatis: DEBUG

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # 打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 显示SQL
    map-underscore-to-camel-case: true
  global-config:
    banner: false

ribbon:
  ReadTimeout: 2000
  ConnectTimeout: 2000

feign:
  sentinel:
    enabled: false
  httpclient:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 60000
        readTimeout: 60000

remoteService:
  account: px-ifp-account
  base: px-ifp-base
  store: px-ifp-store

cache:
  redis:
    enableCache: true
    expireTime: 2
  local:
    enableCache: true
    expireTime: 2

knife4j:
  enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    show-extensions: true
  api-docs:
    enabled: true
    path: /v3/api-docs
    group-configs:
      - group: 'default'
        paths-to-match: '/**'
        packages-to-scan: com.pxsemic.ifp.operation
    default-flat-param-object: false

xxl:
  job:
    accessToken: default_token
    executor:
      appName: spcJob
      ip:
      logPath: /data/ifp/log/xxl-job
      logRetentionDays: -1
      port: 9999
    admin:
      addresses: http://localhost:8088/xxl-job-admin

#elasticsearch:
#  index: index-rs-ifp
#  name: 192.168.29.11
#  password: elastic
#  port: 9200
#  username: elastic

spc:
  enableOcapFlow: true
  kafka:
    mode: prd # 环境模式：prd(正式环境) / mock(模拟环境)
    topics:
      monitor-data:
        prd: dwd_mnt_monitor_spc_rti
        mock: spc-monitor-data
    consumer:
      group-id: spc-alarm-processor
      concurrency: 3
      max-poll-records: 100
      fetch-max-wait-ms: 200
    message-format:
      business-format-topics:

  idempotency:
    bloom-filter:
      expected-insertions: 1000000
      false-positive-probability: 0.01
      reset-threshold: 0.9

  redis-stream:
    enabled: true
    window-size-ms: 5000 # 排序窗口：5秒
    batch-size: 100 # 每次读取消息数
    max-stream-length: 1000 # Stream 最大长度（防止内存溢出）