services:
  redis:
    image: redis:7.0.12
    container_name: spc-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - spc-dev-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: spc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - spc-dev-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: spc-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    restart: unless-stopped
    networks:
      - spc-dev-net

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: spc-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5"
      NACOS_AUTH_IDENTITY_KEY: "nacos"
      NACOS_AUTH_IDENTITY_VALUE: "nacos"
      JVM_XMS: 256m
      JVM_XMX: 512m
    restart: unless-stopped
    networks:
      - spc-dev-net

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: spc-xxl-job
    ports:
      - "8088:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://host.docker.internal:3307/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
        --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
        --xxl.job.accessToken=default_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - spc-dev-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: spc-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped
    networks:
      - spc-dev-net

  tdengine:
    image: tdengine/tdengine:latest
    container_name: spc-tdengine
    ports:
      - "6030:6030"
      - "6041:6041"
      - "6060:6060"
    environment:
      TAOS_FQDN: localhost
    volumes:
      - spc-tdengine-data:/var/lib/taos
    restart: unless-stopped
    networks:
      - spc-dev-net

networks:
  spc-dev-net:
    driver: bridge

volumes:
  spc-tdengine-data:
